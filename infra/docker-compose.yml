networks:
  life-dashboard:
    external: true
    name: life-dashboard

volumes:
  caddy_data:
  caddy_logs:

services:
  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    image: life-dashboard-api:latest
    restart: unless-stopped
    networks:
      - life-dashboard
    # Not exposed to the host — Caddy reaches it via the Docker network.
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on: []   # postgres-1 is external; healthcheck handles readiness

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
      args:
        # Next.js uses this server-side to proxy /api/* to the API container.
        API_URL: http://api:8000
    image: life-dashboard-web:latest
    restart: unless-stopped
    networks:
      - life-dashboard
    environment:
      - NODE_ENV=production
      - API_URL=http://api:8000
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    networks:
      - life-dashboard
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Set TS_HOSTNAME in infra/.env — e.g. nas.your-tailnet.ts.net
      # Used by the Caddyfile for the server name and TLS cert paths.
      - TS_HOSTNAME=${TS_HOSTNAME}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      # Tailscale stores certs here on Synology DSM.
      # Refresh with: sudo tailscale cert ${TS_HOSTNAME}
      - /var/packages/Tailscale/var/certs:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_logs:/var/log/caddy
    depends_on:
      - web
